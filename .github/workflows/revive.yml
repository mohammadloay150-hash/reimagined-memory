name: Kaggle Zombie Bot Revival

on:
  schedule:
    # سيقوم GitHub بتشغيل هذا الكود تلقائياً كل 11 ساعة
    - cron: '0 */11 * * *'
  workflow_dispatch: # زر لتشغيل السكريبت يدوياً متى أردت

jobs:
  revive-bot:
    runs-on: ubuntu-latest
    steps:
      - name: إعداد بيئة العمل
        uses: actions/checkout@v3

      - name: تجهيز بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: تثبيت مكتبة كاجل
        run: pip install kaggle

      - name: إعداد بيانات الدخول (Direct)
        run: |
          mkdir -p ~/.kaggle
          # وضع البيانات مباشرة في ملف الإعدادات
          echo '{"username":"mohammadloay","key":"fad2461497d9d85b4c707050bdc43ad0"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: سحب وإعادة تشغيل البوت
        run: |
          # سحب ملفات النوت بوك من الرابط الخاص بك
          kaggle kernels pull mohammadloay/notebook954402994b -p bot_code
          
          # إعادة الرفع لتصفير وقت التشغيل (Restart)
          kaggle kernels push -p bot_code
