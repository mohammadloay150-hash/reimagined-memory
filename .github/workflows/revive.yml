name: Kaggle Zombie Bot Revival

on:
  schedule:
    # سيقوم بالتشغيل التلقائي كل 10 ساعات لضمان بقاء البوت حياً
    - cron: '0 */10 * * *'
  workflow_dispatch: # هذا الزر يسمح لك بتشغيله يدوياً في أي وقت للتجربة

jobs:
  revive-bot:
    runs-on: ubuntu-latest
    steps:
      - name: إعداد بيئة العمل
        uses: actions/checkout@v4

      - name: تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت مكتبة كاجل الرسمية
        run: pip install kaggle

      - name: حقن بيانات الاعتماد (API Token)
        run: |
          mkdir -p ~/.kaggle
          # استخدام التوكن الجديد الخاص بك mohammadloay
          echo '{"username":"mohammadloay","key":"454b86bad813de576fa9533baaad2cad"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: سحب وإعادة تشغيل البوت (إجباري)
        run: |
          # 1. سحب الكود الحالي من كاجل للتأكد من الاتصال
          kaggle kernels pull mohammadloay/notebook954402994b -p bot_code
          
          # 2. حركة ذكية: تعديل بسيط في الميتا داتا لإجبار كاجل على تصفير عداد الـ 12 ساعة
          sed -i 's/"id": "/"id": "r-/' bot_code/kernel-metadata.json
          
          # 3. إعادة الرفع (Push) لإعادة إطلاق البوت فوراً
          kaggle kernels push -p bot_code
