name: Kaggle Zombie Bot Revival

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  revive-bot:
    runs-on: ubuntu-latest
    # وضعنا البيانات هنا لضمان وصولها لكاجل بشكل صحيح 100%
    env:
      KAGGLE_USERNAME: "mohammadloay"
      KAGGLE_KEY: "KGAT_454b86bad813de576fa9533baaad2cad"
    steps:
      - name: إعداد بيئة العمل
        uses: actions/checkout@v4

      - name: تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت مكتبة كاجل
        run: pip install kaggle

      - name: سحب وإعادة تشغيل البوت (بدون GPU)
        run: |
          mkdir -p bot_code
          # 1. سحب النوت بوك
          kaggle kernels pull mohammadloay/notebook954402994b -p bot_code
          
          # 2. إنشاء الميتا داتا (مطابقة تماماً لاسم النوت بوك وبدون GPU)
          echo '{
            "id": "mohammadloay/notebook954402994b",
            "title": "notebook954402994b",
            "code_file": "notebook954402994b.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": false,
            "enable_gpu": false,
            "enable_tpu": false,
            "enable_internet": true,
            "dataset_sources": [],
            "kernel_sources": [],
            "competition_sources": []
          }' > bot_code/kernel-metadata.json
          
          # 3. حركة بسيطة لتغيير محتوى الملف لضمان "تصفير العداد"
          echo " " >> bot_code/notebook954402994b.ipynb
          
          # 4. الرفع والتشغيل
          kaggle kernels push -p bot_code
