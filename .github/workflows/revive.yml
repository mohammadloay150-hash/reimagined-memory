name: Kaggle Zombie Bot Revival

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  revive-bot:
    runs-on: ubuntu-latest
    steps:
      - name: إعداد بيئة العمل
        uses: actions/checkout@v4

      - name: تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت مكتبة كاجل
        run: pip install kaggle

      - name: إعداد بيانات الدخول
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"mohammadloay","key":"454b86bad813de576fa9533baaad2cad"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: سحب وإعادة تشغيل البوت (GPU المعطل)
        run: |
          # 1. سحب البوت مع ملف الإعدادات
          kaggle kernels pull mohammadloay/notebook954402994b -p bot_code -m
          
          # 2. إنشاء ملف الإعدادات إذا لم يوجد أو تعديله لتعطيل GPU
          if [ ! -f "bot_code/kernel-metadata.json" ]; then
            echo '{"id":"mohammadloay/notebook954402994b","title":"notebook954402994b","code_file":"notebook954402994b.ipynb","language":"python","kernel_type":"notebook","is_private":false,"enable_gpu":false,"enable_tpu":false,"enable_internet":true,"dataset_sources":[],"kernel_sources":[],"competition_sources":[]}' > bot_code/kernel-metadata.json
          else
            # تعطيل الـ GPU إجبارياً وتفعيل الإنترنت
            sed -i 's/"enable_gpu": true/"enable_gpu": false/g' bot_code/kernel-metadata.json
            sed -i 's/"enable_internet": false/"enable_internet": true/g' bot_code/kernel-metadata.json
            # تغيير بسيط في العنوان لتصفير العداد في كاجل
            sed -i 's/"title": "/"title": "r-/' bot_code/kernel-metadata.json
          fi
          
          # 3. إعادة الرفع والتشغيل فوراً
          kaggle kernels push -p bot_code
