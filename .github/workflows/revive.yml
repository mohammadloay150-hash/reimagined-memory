name: Kaggle Zombie Bot Revival

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  revive-bot:
    runs-on: ubuntu-latest
    steps:
      - name: إعداد بيئة العمل
        uses: actions/checkout@v4

      - name: تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تثبيت مكتبة كاجل
        run: pip install kaggle

      - name: إعداد بيانات الدخول
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"mohammadloay","key":"454b86bad813de576fa9533baaad2cad"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: سحب وإعادة تشغيل البوت (بدون GPU)
        run: |
          # 1. إنشاء المجلد وسحب ملف النوت بوك فقط
          mkdir -p bot_code
          kaggle kernels pull mohammadloay/notebook954402994b -p bot_code
          
          # 2. إنشاء ملف الإعدادات يدوياً لضمان تعطيل GPU وتفعيل الإنترنت
          echo '{
            "id": "mohammadloay/notebook954402994b",
            "title": "notebook954402994b-revived",
            "code_file": "notebook954402994b.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": false,
            "enable_gpu": false,
            "enable_tpu": false,
            "enable_internet": true,
            "dataset_sources": [],
            "kernel_sources": [],
            "competition_sources": []
          }' > bot_code/kernel-metadata.json
          
          # 3. إعادة الرفع لتشغيل الجلسة فوراً بالمواصفات الجديدة
          kaggle kernels push -p bot_code
